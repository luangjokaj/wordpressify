services:
  db:
    image: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "wordpress"
    volumes:
      - "persistent_db:/var/lib/mysql"
    ports:
      - "3306:3306"

  wordpress:
    build:
      dockerfile: ./Dockerfile-wordpress
      context: .
    expose:
      - "9000"
    environment:
      WORDPRESS_DB_HOST: "db"
      WORDPRESS_DB_USER: "root"
      WORDPRESS_DB_PASSWORD: "root"
      WORDPRESS_DB_NAME: "wordpress"
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'DISABLE_WP_CRON', true );
        define( 'WP_DEBUG_LOG', '/var/xdebug/wp-errors.log' );
        define( 'FS_DIRECT', true );
    volumes:
      - "./build/wordpress:/var/www/html"
      - "./xdebug:/var/xdebug"
      - "./config/php.ini:/usr/local/etc/php/conf.d/overrides.ini"
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "test", "-f", "/var/www/html/wp-includes/version.php"]
      interval: 5s
      timeout: 3s
      retries: 30

  wordpress-chmod:
    image: wordpress:6.9-php8.5-fpm
    depends_on:
      wordpress:
        condition: service_healthy
    volumes:
      - "./build/wordpress:/var/www/html"
    entrypoint: >
      /bin/sh -c "
      chmod -R 777 wp-content/themes &&
      chmod -R 777 wp-content/plugins
      "

  webserver:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
      - "./build/wordpress:/var/www/html"
    depends_on:
      - wordpress-chmod

  nodejs:
    build:
      dockerfile: ./Dockerfile-nodejs
      context: .
    ports:
      - "3001:3001" # Default port for browserSync UI (for debugging)
      - "${PROXY_PORT:-3010}:${PROXY_PORT:-3010}"
    environment:
      - PROXY_PORT=${PROXY_PORT:-3010}
      - THEME_NAME=${THEME_NAME:-wordpressify}
    volumes:
      - "./src:/usr/src/app/src"
      - "./dist:/usr/src/app/dist"
      - "./build:/usr/src/app/build"
      - "./backups:/usr/src/app/backups"
    depends_on:
      - "webserver"
    command: npm run dev
volumes:
  persistent_db:
